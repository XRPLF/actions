on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "create-issue/**"
      - ".github/workflows/test-create-issue.yml"

jobs:
  test-create-issue:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/xrplf/clio-ci:latest

    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run prepare-runner action
        uses: ./prepare-runner
        with:
          enable_ccache: false

      - name: Create an issue 1
        id: create_issue_1
        uses: ./create-issue
        with:
          title: Test issue from workflow (`body`, workflow info, 2 labels, 1 assignee)
          body: This issue was created by a test workflow for the create-issue action.
          labels: "bug,help wanted"
          assignees: "mathbunnyru"

      - name: Write body content to a file
        id: write_body_file
        shell: bash
        run: |
          echo "This issue was created by a test workflow for the create-issue action from body file." > test_issue_body.md

      - name: Create an issue 2
        id: create_issue_2
        uses: ./create-issue
        with:
          title: Test issue from workflow (`body_file`, no workflow info, 1 label, no assignees)
          body_file: test_issue_body.md
          labels: "enhancement"
          append_workflow_info: false

      - name: Check issue numbers
        run: |
          ISSUE_NUMBER_1=${{ steps.create_issue_1.outputs.issue_number }}
          ISSUE_NUMBER_2=${{ steps.create_issue_2.outputs.issue_number }}

          echo "Issue 1 number: ${ISSUE_NUMBER_1}"
          echo "Issue 2 number: ${ISSUE_NUMBER_2}"

          # Check second issue is next number after first issue
          if [ $((ISSUE_NUMBER_1 + 1)) -ne $ISSUE_NUMBER_2 ]; then
            echo "Error: Issue numbers are not sequential."
            exit 1
          fi
