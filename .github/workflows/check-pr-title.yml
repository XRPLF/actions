name: Check PR title

on:
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  check_title:
    runs-on: ubuntu-latest

    steps:
      - if: ${{ github.event_name == 'pull_request' }}
        name: Extract PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "TITLE=${TITLE}" >> $GITHUB_ENV

      - if: ${{ github.event_name == 'merge_group' }}
        name: Extract merge commit title
        run: |
          TITLE=$(echo "${{ github.event.merge_group.head_commit.message }}" | head -n1)
          echo "TITLE=${TITLE}" >> $GITHUB_ENV

      - name: Check if title matches allowed prefix
        run: |
          if ! echo "$TITLE" | grep -qE "^(build|chore|ci|docs|feat|fix|perf|refactor|style|test):"; then
            echo "Error: Title must start with one of: 'build:', 'chore:', 'ci:', 'docs:', 'feat:', 'fix:', 'perf:', 'refactor:', 'style:', 'test:'"
            exit 1
          fi

      - name: Check if title starts with capital letter after prefix
        run: |
          if [[ ! "${TITLE}" =~ ^[a-z]+:\ [\[A-Z] ]]; then
            echo "Error: Title must start with an uppercase letter after the prefix."
            exit 1
          fi
