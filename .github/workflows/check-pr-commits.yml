name: Check PR commits

on:
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  check_commits:
    runs-on: ubuntu-latest

    # The action needs to have write permissions to post comments on the PR.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check signed commits in PR
        uses: 1Password/check-signed-commits-action@ed2885f3ed2577a4f5d3c3fe895432a557d23d52 # v1.2.0
        with:
          comment: |
            ⚠️ This PR contains unsigned commits. To get your PR merged, please sign those commits. ⚠️

            If only the most recent commit is unsigned, you can run:
            1. Amend the commit: `git commit --amend --no-edit -n -S`
            2. Overwrite the commit: `git push --force-with-lease`

            If multiple commits are unsigned, you can run:
            1. Go into interactive rebase mode: `git rebase -i [target branch]`
            2. Change "pick" to "edit" for the commits you need to sign, and then save and exit.
            3. For each commit, run: `git commit --amend --no-edit -n -S`
            4. Continue the rebase: `git rebase --continue`
            5. Overwrite the commit(s): `git push --force-with-lease`

            If you're new to commit signing, there are different ways to set it up:

            <details>
            <summary><b>Sign commits with <code>gpg</code></b></summary>
            <p></p>

            Follow the steps below to set up commit signing with `gpg`:
            1. [Generate a GPG key](https://docs.github.com/en/authentication/managing-commit-signature-verification/generating-a-new-gpg-key)
            2. [Add the GPG key to your GitHub account](https://docs.github.com/en/authentication/managing-commit-signature-verification/adding-a-gpg-key-to-your-github-account)
            3. [Configure `git` to use your GPG key for commit signing](https://docs.github.com/en/authentication/managing-commit-signature-verification/telling-git-about-your-signing-key#telling-git-about-your-gpg-key)
            </details>

            <details>
            <summary><b>Sign commits with <code>ssh-agent</code></b></summary>
            <p></p>

            Follow the steps below to set up commit signing with `ssh-agent`:
            1. [Generate an SSH key and add it to `ssh-agent`](https://docs.github.com/en/authentication/connecting-to-github-with-ssh/generating-a-new-ssh-key-and-adding-it-to-the-ssh-agent)
            2. [Add the SSH key to your GitHub account](https://docs.github.com/en/authentication/connecting-to-github-with-ssh/adding-a-new-ssh-key-to-your-github-account)
            3. [Configure `git` to use your SSH key for commit signing](https://docs.github.com/en/authentication/managing-commit-signature-verification/telling-git-about-your-signing-key#telling-git-about-your-ssh-key)
            </details>

            <details>
            <summary><b>Sign commits with 1Password</b></summary>
            <p></p>

            You can also sign commits using 1Password, which lets you sign commits with biometrics without the signing key leaving the local 1Password process.
            See [use 1Password to sign your commits](https://developer.1password.com/docs/ssh/git-commit-signing/).
            </details>
