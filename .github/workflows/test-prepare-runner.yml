on:
  pull_request:
    paths:
      - ".github/workflows/test-prepare-runner.yml"
      - "prepare-runner/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/test-prepare-runner.yml"
      - "prepare-runner/**"
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  test-prepare-runner:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: heavy
            container: '{ "image": "ghcr.io/xrplf/xrpld/nix-ubuntu:latest" }'
          - os: heavy-arm64
            container: '{ "image": "ghcr.io/xrplf/xrpld/nix-ubuntu:latest" }'
          - os: macos15
          - os: windows

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container != '' && fromJson(matrix.container) || null }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run prepare-runner action
        uses: ./prepare-runner
        with:
          enable_ccache: false

      - name: Verify ccache is disabled
        shell: bash
        run: |
          if [ "$CCACHE_DISABLE" != "1" ]; then
              echo "CCACHE_DISABLE is not set to 1"
              exit 1
          fi
          echo "CCACHE_DISABLE is correctly set to 1"

      - name: Verify build tools are able to run
        shell: bash
        run: |
          cmake --version
          conan --version
          ccache --version
          rustc -Vv

          if [[ "${{ matrix.os }}" == "macos15" ]]; then
              colima --version
              docker --version
          fi
