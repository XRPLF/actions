on:
  pull_request:
    paths:
      - ".github/workflows/test-print-build-env.yml"
      - "print-build-env/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/test-print-build-env.yml"
      - "print-build-env/**"
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  test-print-build-env:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: heavy
            container: '{ "image": "ghcr.io/xrplf/xrpld/nix-ubuntu:latest" }'
          - os: heavy-arm64
            container: '{ "image": "ghcr.io/xrplf/xrpld/nix-ubuntu:latest" }'
          - os: macos15
          - os: windows

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container != '' && fromJson(matrix.container) || null }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare runner
        uses: ./prepare-runner
        with:
          enable_ccache: false

      - name: Run print-build-env action
        uses: ./print-build-env
