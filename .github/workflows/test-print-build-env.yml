on:
  pull_request:
    paths:
      - ".github/workflows/test-print-build-env.yml"
      - "print-build-env/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/test-print-build-env.yml"
      - "print-build-env/**"
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  test-print-build-env:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: heavy
            container: '{ "image": "ghcr.io/xrplf/clio-ci:latest" }'
          - os: heavy-arm64
            container: '{ "image": "ghcr.io/xrplf/clio-ci:latest" }'
          - os: heavy
            container: '{ "image": "ghcr.io/xrplf/ci/debian-trixie:gcc-15" }'
          - os: heavy-arm64
            container: '{ "image": "ghcr.io/xrplf/ci/rhel-10:clang-any" }'
          - os: macos15
          - os: windows

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container != '' && fromJson(matrix.container) || null }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Prepare runner
        uses: ./prepare-runner
        with:
          enable_ccache: false

      - name: Run print-build-env action
        uses: ./print-build-env
